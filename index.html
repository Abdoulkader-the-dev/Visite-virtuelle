<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Street View Style Virtual Tour</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <canvas id="tour-canvas" tabindex="0" role="application"
        aria-label="Visite virtuelle 360 degres, utilisez les touches flechees pour pivoter"></canvas>

    <div id="scene-announcer" aria-live="polite" aria-atomic="true"
        style="position:absolute;left:-9999px;width:1px;height:1px;overflow:hidden;"></div>

    <div id="loading-overlay" class="visible">
        <div class="spinner"></div>
        <span id="loading-text">Chargement...</span>
    </div>

    <div id="transition-overlay"></div>

    <div id="hotspot-container">
        <!--
            FLOOR NAVIGATION HOTSPOT — Style Google Street View
            ====================================================
            3 éléments visuels cohabitent sur le sol du panorama :

            1. #camera-marker  → Croix X blanche fixe au centre de l'écran,
                                 indique la position actuelle de la caméra.
                                 Toujours visible quand la souris est sur le sol.

            2. #floor-hotspot  → Ellipse plate + flèche directionnelle qui suit
                                 la souris. La flèche pointe vers la scène cible.
                                 Apparaît uniquement quand la souris est sur le sol.

            3. #dir-arrows     → Paire de flèches plates (haut/bas) au centre de
                                 l'écran permettant d'avancer/reculer sans tourner
                                 la caméra. Cliquables indépendamment.

            MODIFIER LE STYLE        → css/style.css, section "Floor hotspot"
            MODIFIER LA DIRECTION    → js/hotspots.js, fonction computeArrowAngle()
            MODIFIER LES HOTSPOTS   → js/config.js, tableau hotspots[] de chaque scène
        -->

        <!-- 1. Croix X — marque la position de la caméra au sol -->
        <div id="camera-marker" aria-hidden="true">
            <svg viewBox="0 0 60 60" width="60" height="60" xmlns="http://www.w3.org/2000/svg">
                <!-- Ellipse de perspective au sol -->
                <ellipse cx="30" cy="44" rx="24" ry="8"
                    fill="none" stroke="rgba(255,255,255,0.30)" stroke-width="1.5"/>
                <!-- Bras de la croix X -->
                <line x1="12" y1="12" x2="48" y2="48"
                    stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
                <line x1="48" y1="12" x2="12" y2="48"
                    stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
            </svg>
        </div>

        <!-- 2. Hotspot de navigation : ellipse plate + flèche directionnelle -->
        <!--
            La flèche (#floor-arrow-svg) pivote via JS pour pointer vers la cible.
            L'ellipse simule la perspective d'un objet posé à plat sur le sol.
            Le label affiche le nom de la scène cible.
        -->
        <div id="floor-hotspot">
            <svg id="floor-arrow-svg" viewBox="0 0 128 74" width="128" height="74"
                xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <!--
                    ELLIPSE DE SOL
                    Simule un disque vu en perspective (aplati).
                    Modifier rx/ry pour changer les proportions.
                    Modifier fill pour changer la couleur de fond.
                -->
                <ellipse cx="64" cy="48" rx="50" ry="17"
                    fill="rgba(0,0,0,0.10)"
                    stroke="rgba(255,255,255,0.55)" stroke-width="1.2"/>

                <!--
                    FLÈCHE DIRECTIONNELLE PLATE
                    Pointe vers le haut (0°) par défaut.
                    La rotation est appliquée par JS sur #floor-arrow-svg.
                    Modifier les points pour changer la forme de la flèche.
                    Modifier fill pour changer la couleur.
                -->
                <path d="M64 12 L104 47 L82 42 L64 56 L46 42 L24 47 Z"
                    fill="rgba(255,255,255,0.88)"/>
                <!-- Tige de la flèche -->
                <path d="M64 24 L88 45 L75 42 L64 50 L53 42 L40 45 Z"
                    fill="rgba(255,255,255,0.34)"/>
            </svg>
            <div id="floor-hotspot-label"></div>
        </div>

        <!-- 3. Flèches directionnelles fixes — avancer/reculer sans tourner -->
        <!--
            Ces flèches sont positionnées au centre de l'écran (bas).
            Elles permettent d'aller vers la scène suivante/précédente
            dans l'axe de vue actuel, sans rotation de caméra.
            Gérées par js/hotspots.js → initDirArrows()
        -->
        <div id="dir-arrows" aria-label="Navigation directionnelle">
            <button id="dir-arrow-fwd" type="button" aria-label="Avancer">
                <svg viewBox="0 0 44 24" width="44" height="24" xmlns="http://www.w3.org/2000/svg">
                    <polygon points="22,2 42,22 22,15 2,22"
                        fill="white" fill-opacity="0.90"/>
                </svg>
            </button>
            <button id="dir-arrow-bwd" type="button" aria-label="Reculer">
                <svg viewBox="0 0 44 24" width="44" height="24" xmlns="http://www.w3.org/2000/svg">
                    <polygon points="22,22 42,2 22,9 2,2"
                        fill="white" fill-opacity="0.55"/>
                </svg>
            </button>
        </div>

        <div id="info-hotspot-layer"></div>
    </div>

    <button id="back-btn" type="button" aria-label="Retour scene precedente" style="display:none">
        <svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 12H5m7-7-7 7 7 7" />
        </svg>
    </button>

    <button id="nav-toggle" type="button" aria-label="Menu">
        <span></span>
        <span></span>
        <span></span>
    </button>

    <div id="nav-menu" class="open" role="navigation" aria-label="Menu des scenes">
        <h2>Visite virtuelle</h2>
        <button id="share-btn" type="button" aria-label="Partager la vue">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71" />
                <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71" />
            </svg>
            <span>Partager</span>
        </button>
        <div id="scene-list"></div>
    </div>

    <div id="compass" role="img" aria-label="Boussole, cap actuel">
        <svg id="compass-rose" viewBox="0 0 56 56" width="56" height="56">
            <circle cx="28" cy="28" r="26" fill="rgba(0,0,0,0.6)" stroke="rgba(255,255,255,0.2)" stroke-width="1" />
            <text x="28" y="10" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="9"
                font-family="system-ui">N</text>
            <text x="28" y="52" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="9"
                font-family="system-ui">S</text>
            <text x="50" y="31" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="9"
                font-family="system-ui">E</text>
            <text x="6" y="31" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="9"
                font-family="system-ui">W</text>
            <g id="compass-needle">
                <polygon points="28,10 31,28 28,26 25,28" fill="#EF4444" />
                <polygon points="28,46 31,28 28,30 25,28" fill="rgba(255,255,255,0.5)" />
            </g>
        </svg>
        <div id="compass-heading">0 N</div>
    </div>

    <div id="minimap" role="navigation" aria-label="Minimap de navigation"></div>

    <div id="zoom-controls">
        <button id="zoom-in" type="button" aria-label="Zoomer">+</button>
        <div id="zoom-level">133%</div>
        <button id="zoom-out" type="button" aria-label="Dézoomer">-</button>
    </div>

    <button id="fullscreen-btn" type="button" aria-label="Plein ecran">
        <svg id="fs-icon-expand" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor"
            stroke-width="2">
            <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3" />
        </svg>
        <svg id="fs-icon-compress" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor"
            stroke-width="2" style="display:none">
            <path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 0 2-2h3M3 16h3a2 2 0 0 0 2 2v3" />
        </svg>
    </button>

    <div id="camera-logo">
        <svg viewBox="0 0 48 48" aria-hidden="true">
            <path d="M15 14l4-5h10l4 5h6a5 5 0 0 1 5 5v15a5 5 0 0 1-5 5H9a5 5 0 0 1-5-5V19a5 5 0 0 1 5-5h6z"></path>
            <circle cx="24" cy="26" r="8"></circle>
            <circle cx="38" cy="20" r="2"></circle>
        </svg>
        <span>Virtual Tour</span>
    </div>

    <div id="info-card">
        <button id="info-close" type="button" aria-label="Fermer">×</button>
        <div id="info-icon"></div>
        <div>
            <h3 id="info-title"></h3>
            <p id="info-description"></p>
        </div>
    </div>

    <div id="reticle">
        <div id="reticle-progress"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/state.js"></script>
    <script src="js/controls.js"></script>
    <script src="js/transition.js"></script>
    <script src="js/hotspots.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
